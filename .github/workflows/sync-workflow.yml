name: Sincronización Incremental del Digesto

on:
  schedule:
    # Se ejecuta todos los días a las 03:00 AM UTC (12:00 AM hora de Argentina)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite ejecutar el flujo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias del Sistema (OCR y PDF)
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-spa

    - name: Instalar Dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install requests mammoth pypdf pdf2image pytesseract

    - name: Ejecutar Sincronización
      env:
        TURSO_URL: ${{ secrets.TURSO_URL }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python scratch/sync_incremental.py
