name: Backfill y OCR de Normas Existentes

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Cantidad de normas a procesar en esta ejecución'
        required: true
        default: '150'

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias del Sistema (OCR y PDF)
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-spa

    - name: Instalar Dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install requests mammoth pypdf pdf2image pytesseract

    - name: Ejecutar Backfill y OCR
      env:
        TURSO_URL: ${{ secrets.TURSO_URL }}
        TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python scratch/ocr_backfill.py --limit=${{ github.event.inputs.limit }}
